hname: Deploy LatLUG Demo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Hetzner
        env:
DEPLOY_KEY: ${{ secrets.HETZNER_DEPLOY_KEY_V2 }}
    DEPLOY_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          echo "[DEPLOY] Pulling latest code on server..."
          ssh root@$DEPLOY_HOST "cd /app/latlug && git pull origin main && echo '✅ Code updated'"
          
          echo "[DEPLOY] Restarting latlug service..."
          ssh root@$DEPLOY_HOST "systemctl restart latlug && sleep 2 && echo '✅ Service restarted'"
          
          echo "✅ LatLUG Demo deployed successfully!"
          echo "🌐 http://studsup.eu/latlug-demo"
